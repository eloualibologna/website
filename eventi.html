<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eventi - ElOuali Bologna</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <header class="site-header">
  <div class="container header-inner">
    <a href="index.html" class="brand" aria-label="Torna alla home">
      <img src="assets/img/logoElOuali.jpg" alt="Logo ElOuali Bologna" class="brand-logo">
      <div class="brand-text">
        <span class="brand-title">ElOuali Bologna</span>
        <span class="brand-subtitle">Per la libertà del Sahara Occidentale</span>
      </div>
    </a>

    <!-- Menu con i collegamenti alla Home -->
    <nav class="main-nav" id="mainNav" aria-label="Menu principale">
      <ul>
        <li><a href="eventi.html" class="active">News & Eventi</a></li> <!-- Pagina attuale -->
        <li><a href="index.html#chi-siamo">Chi siamo</a></li>
        <li><a href="index.html#cosa-facciamo">Cosa facciamo</a></li>
        <li><a href="index.html#partnership">Partnership</a></li>
        <li><a href="index.html#saharawi">Chi sono i Saharawi</a></li>
        <li><a href="index.html#sostienici">Sostienici</a></li>
        <li><a href="index.html#contatti">Contatti</a></li>
        
        <!-- Icone Social -->
        <li class="nav-social">
          <a href="https://www.facebook.com/elouali.bologna" target="_blank" aria-label="Facebook">
            <i class="fab fa-facebook-f"></i>
          </a>
          <a href="https://www.instagram.com/eloualibologna" target="_blank" aria-label="Instagram">
            <i class="fab fa-instagram"></i>
          </a>
        </li>
      </ul>
    </nav>
    <button id="navToggle" class="nav-toggle" aria-label="Apri menu" aria-expanded="false">
        <i class="fas fa-bars"></i>
      </button>
  </div>
</header>

    <main>
        <section class="section">
            <div class="container">
                <h1 class="section-title">News & Eventi</h1>
                <p class="section-subtitle">Rimani aggiornato sulle nostre iniziative, banchetti e incontri pubblici.
                </p>

                <div class="events-grid">
                    <article class="event-card">
                        <div class="event-image">
                            <a href="assets/img/Evento7maggio.jpeg" target="_blank"
                                aria-label="Ingrandisci il volantino: Titolo dell'Evento 2024">
                                <img src="assets/img/Evento7maggio.jpeg" alt="Volantino 7 maggio">
                            </a>
                        </div>
                        <div class="event-info">
                            <h3>Circolo Arci Brecht</h3>
                            <p class="event-date"><i class="far fa-calendar-alt"></i> 7 Maggio 2026</p>
                        </div>
                    </article>

                </div>
            </div>
        </section>
    </main>

  <script>
    const navToggle = document.getElementById("navToggle");
    const mainNav = document.getElementById("mainNav");

    navToggle.addEventListener("click", function () {
      mainNav.classList.toggle("open");
      const isOpen = mainNav.classList.contains("open");
      navToggle.setAttribute("aria-expanded", isOpen);
    });

    document.querySelectorAll(".main-nav a").forEach(link => {
      link.addEventListener("click", () => {
        mainNav.classList.remove("open");
        navToggle.setAttribute("aria-expanded", "false");
      });
    });
  </script>
</body>

</html>
